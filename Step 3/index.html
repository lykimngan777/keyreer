<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix | Định Hướng Nghề Nghiệp Gen Z</title>
    <meta name="description"
        content="Website định hướng nghề nghiệp phong cách tối giản dành cho thế hệ Gen Z. Khám phá bản thân và tìm kiếm lộ trình sự nghiệp phù hợp.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .home-btn {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.5rem;
            background: var(--bg-white);
            border: 3px solid var(--text-black);
            font-family: var(--font-main);
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--text-black);
            text-decoration: none;
            cursor: pointer;
            box-shadow: 4px 4px 0px 0px rgba(0, 0, 0, 1);
            transition: var(--transition);
            text-transform: uppercase;
        }
        .home-btn:hover {
            background: var(--primary-mint);
            box-shadow: 6px 6px 0px 0px rgba(0,0,0,1);
            transform: translate(-2px, -2px);
        }
    </style>
</head>

<body>
    <!-- 
    <nav class="navbar">
        <div class="logo">MATRIX</div>
        <ul class="nav-links">
            <li><a href="#about">Về chúng tôi</a></li>
            <li><a href="#careers">Nghề nghiệp</a></li>
            <li><a href="#test">Trắc nghiệm</a></li>
        </ul>
        <div class="nav-cta">
            <button class="btn btn-black">Bắt đầu</button>
        </div>
    </nav>
    -->

    <main>
        <!-- Back to Homepage Button -->
        <a href="../index.html" class="home-btn">
            Trang chủ
        </a>
        <!-- Career Explorer View (from Screenshot) -->
        <section id="explorer" class="explorer-view">
            <div class="explorer-nav">
                <div class="nav-tab active" onclick="location.href='index.html'">Mở lối sự nghiệp</div>
                <div class="nav-tab" id="tab-detail">Chi tiết nghề nghiệp</div>
                <div class="nav-tab" id="tab-roadmap">Lộ trình thực hiện</div>
            </div>

            <div class="matrix-canvas" id="matrix-canvas">
                <!-- Dots background will be handled by CSS -->
                <div class="matrix-grid"></div>

                <!-- Central Hub -->
                <div class="central-hub">
                    <div class="hub-content">
                        <p>Phân tích <br> chi tiết bản thân</p>
                        <div class="hub-icons">🎓 💪</div>
                        <div class="hub-arrow">↓</div>
                    </div>
                    <div class="hub-glow"></div>
                </div>

                <!-- Career Nodes (Generated by JS) -->
                <div id="career-nodes"></div>

                <!-- Strengths Modal (Full-Screen Typewriter) -->
                <div id="strengths-modal" class="modal">
                    <div class="modal-content-fullscreen">
                        <span class="close-modal">&times;</span>
                        <div class="typing-container">
                            <h2 id="typing-title"></h2>
                            <div id="typing-text"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>

</html>

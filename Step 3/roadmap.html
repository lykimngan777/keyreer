<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kế hoạch học tập | Matrix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/Step 3/style.css">
    <style>
        body {
            overflow-y: auto !important;
            overflow-x: hidden !important;
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
        }

        .roadmap-view {
            min-height: 100vh;
            padding: 4rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .roadmap-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .roadmap-header h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            color: var(--text-black);
            -webkit-text-stroke: 1.5px var(--text-black);
            background: var(--bg-white);
            display: inline-block;
            padding: 0.5rem 2rem;
            border: var(--border-width) solid var(--text-black);
            box-shadow: 8px 8px 0px 0px rgba(0, 0, 0, 1);
            transform: rotate(1deg);
        }

        .roadmap-header p {
            color: #333;
            font-size: 1.2rem;
            font-weight: 600;
            max-width: 700px;
            margin: 2rem auto 0;
            background: var(--primary-mint);
            padding: 1rem;
            border: 3px solid var(--text-black);
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
        }

        .back-btn-box {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 100;
        }

        .back-btn {
            padding: 0.8rem 1.5rem;
            background: var(--bg-white);
            color: var(--text-black);
            border: 3px solid var(--text-black);
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 4px 4px 0px 0px rgba(0, 0, 0, 1);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
        }

        .back-btn:hover {
            background: var(--primary-pink);
            color: white;
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px 0px rgba(0, 0, 0, 1);
        }

        /* Filter Box */
        .filter-box {
            background: var(--bg-white);
            padding: 2.5rem;
            border: var(--border-width) solid var(--text-black);
            box-shadow: 10px 10px 0px 0px rgba(0,0,0,1);
            display: flex;
            align-items: flex-end;
            gap: 2rem;
            margin-bottom: 4rem;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 900px;
            border-radius: 20px;
        }

        .select-group {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            min-width: 280px;
        }

        .select-group label {
            font-size: 1rem;
            font-weight: 900;
            color: var(--text-black);
            text-transform: uppercase;
        }

        .select-group select {
            padding: 1rem;
            border-radius: 12px;
            border: 3px solid var(--text-black);
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 700;
            outline: none;
            cursor: pointer;
            background: #fafafa;
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
            transition: var(--transition);
        }

        .select-group select:focus {
            background: var(--primary-yellow);
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        /* Roadmap Result */
        .roadmap-result {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 3rem;
        }

        .roadmap-step {
            background: var(--bg-white);
            border: var(--border-width) solid var(--text-black);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 12px 12px 0px 0px rgba(0,0,0,1);
            position: relative;
            animation: slideUp 0.5s ease forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .step-badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: var(--primary-pink);
            color: white;
            font-weight: 900;
            font-size: 0.9rem;
            border: 2px solid var(--text-black);
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .roadmap-step h2 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 2rem;
            color: var(--text-black);
            text-transform: uppercase;
        }

        .step-content {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 3rem;
        }

        .skill-list h3, .course-list h3 {
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--text-black);
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .skill-list li {
            position: relative;
            padding-left: 2rem;
            margin-bottom: 1rem;
            color: var(--text-black);
            font-size: 1.1rem;
            font-weight: 600;
            list-style: none;
        }

        .skill-list li::before {
            content: "✔";
            position: absolute;
            left: 0;
            color: var(--primary-mint);
            font-weight: 900;
            font-size: 1.2rem;
        }

        .coursera-card {
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            background: var(--bg-white);
            border: 3px solid var(--text-black);
            border-radius: 16px;
            margin-bottom: 1.5rem;
            text-decoration: none;
            transition: var(--transition);
            box-shadow: 5px 5px 0px 0px rgba(0,0,0,1);
        }

        .coursera-card:hover {
            background: var(--primary-yellow);
            transform: translate(-3px, -3px);
            box-shadow: 8px 8px 0px 0px rgba(0, 0, 0, 1);
        }

        .coursera-logo {
            font-size: 0.8rem;
            font-weight: 900;
            color: #0056D2;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .coursera-title {
            font-size: 1.1rem;
            color: var(--text-black);
            font-weight: 800;
            line-height: 1.4;
        }

        .arrow-down {
            text-align: center;
            font-size: 3rem;
            color: var(--text-black);
            font-weight: 900;
            margin: -1.5rem 0;
            -webkit-text-stroke: 1.5px white;
        }

        @media (max-width: 768px) {
            .roadmap-header h1 { font-size: 2rem; }
            .filter-box { flex-direction: column; align-items: stretch; gap: 1.5rem; }
            .select-group { min-width: 100%; }
            .step-content { grid-template-columns: 1fr; gap: 2.5rem; }
            .back-btn-box { position: static; margin-bottom: 2rem; }
        }
    </style>
</head>

<body>
    <div class="roadmap-view">
        <div class="back-btn-box">
            <a href="javascript:history.back()" class="back-btn">
                <span>&larr;</span> Quay lại
            </a>
        </div>

        <div class="explorer-nav" style="margin-top: 1rem; margin-bottom: 4rem;">
            <div class="nav-tab" onclick="location.href='./'">Mở lối sự nghiệp</div>
            <div class="nav-tab" id="nav-detail">Chi tiết nghề nghiệp</div>
            <div class="nav-tab active">Lộ trình thực hiện</div>
        </div>

        <div class="roadmap-header">
            <h1>Lộ trình phát triển</h1>
            <p id="career-subtitle">Tùy chỉnh hành trình phát triển để đạt được mục tiêu của bạn.</p>
        </div>

        <div class="filter-box">
            <div class="select-group">
                <label>Vị trí hiện tại</label>
                <select id="start-level">
                    <option value="0">Thực tập sinh / Fresher</option>
                    <option value="1">Chuyên viên (Junior)</option>
                    <option value="2">Chuyên viên Cao cấp (Senior)</option>
                </select>
            </div>
            <div class="select-group">
                <label>Mục tiêu hướng tới</label>
                <select id="end-level">
                    <option value="1">Chuyên viên (Junior)</option>
                    <option value="2" selected>Chuyên viên Cao cấp (Senior)</option>
                    <option value="3">Quản lý / Trưởng nhóm (Manager)</option>
                </select>
            </div>
            <button class="btn btn-black" onclick="generateRoadmap()" style="padding: 1rem 3rem;">Tạo lộ trình</button>
        </div>

        <div id="roadmap-result" class="roadmap-result">
            <!-- Roadmap injected here -->
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const careerName = urlParams.get('career') || 'Nghề nghiệp';
            document.getElementById('career-subtitle').innerHTML = `Tùy chỉnh hành trình phát triển cho <strong>${careerName}</strong>.`;
            document.title = `Kế hoạch học tập - ${careerName} | Matrix`;
            document.getElementById('nav-detail').onclick = () => location.href = `timeline.html?career=${encodeURIComponent(careerName)}`;

            generateRoadmap();
        });

        const transitionData = {
            "0-1": {
                badge: "Giai đoạn 1",
                title: "Trở thành Junior",
                skills: [
                    "Sử dụng thành thạo các công cụ chuyên ngành cơ bản",
                    "Khả năng tự giải quyết các module công việc nhỏ",
                    "Kỹ năng giao tiếp và làm việc nhóm hiệu quả",
                    "Hiểu quy trình làm việc chuẩn của doanh nghiệp"
                ],
                courses: [
                    { name: "Google Data Analytics Professional Certificate", link: "https://www.coursera.org/professional-certificates/google-data-analytics" },
                    { name: "Work Smarter, Not Harder: Time Management", link: "https://www.coursera.org/learn/work-smarter-not-harder" }
                ]
            },
            "1-2": {
                badge: "Giai đoạn 2",
                title: "Nâng cấp lên Senior",
                skills: [
                    "Khả năng tư duy hệ thống và thiết kế giải pháp",
                    "Giải quyết các bài toán phức tạp, tối ưu hóa hiệu suất",
                    "Kỹ năng hướng dẫn (Mentoring) cho nhân sự mới",
                    "Quản lý tiến độ dự án độc lập"
                ],
                courses: [
                    { name: "IBM Full Stack Software Developer Professional Certificate", link: "https://www.coursera.org/professional-certificates/ibm-full-stack-cloud-developer" },
                    { name: "Agile with Atlassian Jira", link: "https://www.coursera.org/learn/agile-atlassian-jira" }
                ]
            },
            "2-3": {
                badge: "Giai đoạn 3",
                title: "Thăng tiến vị trí Manager",
                skills: [
                    "Nghệ thuật lãnh đạo và truyền cảm hứng (Leadership)",
                    "Lập kế hoạch chiến lược và phân bổ ngân sách",
                    "Quản trị rủi ro và quản trị sự thay đổi",
                    "Kỹ năng đàm phán và thuyết phục cấp cao"
                ],
                courses: [
                    { name: "Strategic Leadership and Management Specialization", link: "https://www.coursera.org/specializations/strategic-leadership" },
                    { name: "Business Strategy from Wharton", link: "https://www.coursera.org/specializations/wharton-business-strategy" }
                ]
            }
        };

        function generateRoadmap() {
            const start = parseInt(document.getElementById('start-level').value);
            const end = parseInt(document.getElementById('end-level').value);
            const resultContainer = document.getElementById('roadmap-result');

            if (start >= end) {
                resultContainer.innerHTML = `
                    <div style="text-align: center; padding: 3rem; background: #fff; border: 4px solid black; box-shadow: 8px 8px 0px 0px rgba(0,0,0,1); border-radius: 20px;">
                        <h3 style="color: #FF0080; margin-bottom: 1rem; font-weight: 900; font-size: 1.5rem;">LỰA CHỌN KHÔNG HỢP LỆ</h3>
                        <p style="font-weight: 600;">Vui lòng chọn mục tiêu hướng tới cao hơn vị trí hiện tại của bạn.</p>
                    </div>
                `;
                return;
            }

            let html = '';
            let delay = 0;

            for (let i = start; i < end; i++) {
                const stepKey = `${i}-${i + 1}`;
                const data = transitionData[stepKey];
                
                if (i > start) {
                    html += `<div class="arrow-down" style="animation: fadeIn 0.5s ease forwards; animation-delay: ${delay}s; opacity: 0;">↓</div>`;
                }

                html += `
                    <div class="roadmap-step" style="animation-delay: ${delay}s;">
                        <div class="step-badge">${data.badge}</div>
                        <h2>${data.title}</h2>
                        <div class="step-content">
                            <div class="skill-list">
                                <h3>Kỹ năng cần bổ sung</h3>
                                <ul>
                                    ${data.skills.map(skill => `<li>${skill}</li>`).join('')}
                                </ul>
                            </div>
                            <div class="course-list">
                                <h3>Coursera Gợi Ý</h3>
                                <div>
                                    ${data.courses.map(course => `
                                        <a href="${course.link}" target="_blank" class="coursera-card">
                                            <span class="coursera-logo">Coursera</span>
                                            <span class="coursera-title">${course.name}</span>
                                        </a>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                delay += 0.2;
            }

            resultContainer.innerHTML = html;
        }
    </script>
</body>

</html>
